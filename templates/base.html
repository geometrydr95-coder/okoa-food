{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{% block title %}Okoa Food{% endblock %}</title>

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
theme: {
extend: {
colors: {
okoa: "#006644"
}
}
}
}
</script>

<style>
body{
font-family: system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}
</style>

</head>

<body class="bg-gray-50 text-gray-800">

<!-- NAVBAR -->
<nav class="bg-white border-b sticky top-0 z-50">
<div class="max-w-5xl mx-auto px-4">

<div class="flex items-center justify-between h-14">

<a href="{% url 'index' %}" class="flex items-center font-bold text-okoa text-lg">
<span>Okoa Food</span>
</a>

<div class="flex items-center space-x-4">

<a href="{% url 'browse' %}" class="text-sm font-medium text-gray-700 hover:text-okoa">
Browse
</a>

<a href="{% url 'profile' %}" class="text-gray-700 hover:text-okoa">

<!-- user icon -->
<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
<path stroke-linecap="round" stroke-linejoin="round"
d="M5.121 17.804A9 9 0 1118.879 17.804M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
</svg>

</a>

</div>
</div>
</div>
</nav>

<!-- PAGE CONTENT -->
<main class="max-w-5xl mx-auto px-4 py-6">
{% block content %}{% endblock %}
</main>

<!-- FOOTER -->
<footer class="border-t bg-white mt-10">
<div class="max-w-5xl mx-auto px-4 py-6 text-sm text-gray-500 flex justify-between">

<span>© 2026 Okoa Food</span>
<span>Reduce Waste. Save Money.</span>

</div>
</footer>

</body>
</html>
